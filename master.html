<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МобиФикс — Кабинет мастера</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0e0e10;--accent:#ff3d3d;--accent2:#ff7a00;--white:#f8f5f0;--gray:#1c1c20;--card:#16161a;--muted:#888;--green:#22c55e;--blue:#3b82f6;--font-head:'Unbounded',sans-serif;--font-body:'Mulish',sans-serif}
body{background:var(--black);color:var(--white);font-family:var(--font-body);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:3rem 1.5rem}
.logo{font-family:var(--font-head);font-weight:900;font-size:1.3rem;margin-bottom:.3rem}
.logo span{color:var(--accent)}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:2rem}

.login-card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2rem;max-width:380px;margin:4rem auto}
.login-card h2{font-family:var(--font-head);font-size:1.1rem;margin-bottom:1.2rem}
input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.75rem 1rem;color:var(--white);font-size:.9rem;margin-bottom:.8rem;outline:none}
input:focus{border-color:var(--accent)}
button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.8rem;width:100%;font-family:var(--font-head);font-size:.75rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer}
button:hover{opacity:.9}
.err{color:#f87171;font-size:.82rem;margin-bottom:.8rem;display:none}
.err.show{display:block}

#panel{display:none}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.master-info{display:flex;align-items:center;gap:.8rem}
.master-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem}
.master-name{font-family:var(--font-head);font-weight:700;font-size:.95rem}
.master-rating{font-size:.78rem;color:var(--muted)}
.logout{background:none;border:1px solid rgba(255,255,255,.15);width:auto;padding:.5rem 1.1rem;font-size:.7rem}

.tabs{display:flex;gap:.6rem;margin-bottom:1.5rem}
.tab{padding:.6rem 1.2rem;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);font-family:var(--font-head);font-size:.7rem;font-weight:700;letter-spacing:.05em;cursor:pointer;width:auto}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.count-badge{background:rgba(255,255,255,.1);border-radius:100px;padding:.1rem .5rem;font-size:.65rem;margin-left:.4rem}

.req-card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:1.3rem 1.5rem;margin-bottom:1rem}
.req-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.8rem;margin-bottom:.8rem}
.req-device{font-family:var(--font-head);font-weight:700;font-size:1rem;margin-bottom:.3rem}
.req-issue{font-size:.85rem;color:var(--white)}
.req-meta{font-size:.78rem;color:var(--muted);margin-top:.4rem;display:flex;gap:1rem;flex-wrap:wrap}
.status-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .8rem;border-radius:100px;font-family:var(--font-head);font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.badge-received{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.badge-assigned{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.badge-inprogress{background:rgba(255,122,0,.15);color:#fb923c;border:1px solid rgba(255,122,0,.3)}
.badge-done{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.req-actions{display:flex;gap:.6rem;margin-top:1rem;flex-wrap:wrap}
.btn-sm{width:auto;padding:.6rem 1.2rem;font-size:.68rem}
.btn-outline-sm{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--white)}
.btn-green{background:var(--green)}
.btn-blue{background:var(--blue)}
.empty{text-align:center;color:var(--muted);padding:3rem}
.empty-icon{font-size:2.5rem;margin-bottom:.8rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Моби<span>Фикс</span> · Кабинет мастера</div>
  <div class="sub">Очередь заявок и активные заказы</div>

  <div class="login-card" id="login-box">
    <h2>Вход для мастера</h2>
    <div class="err" id="login-err"></div>
    <input type="email" id="email" placeholder="Email"/>
    <input type="password" id="password" placeholder="Пароль"/>
    <button onclick="doLogin()">Войти</button>
  </div>

  <div id="panel">
    <div class="top-bar">
      <div class="master-info">
        <div class="master-avatar" id="m-avatar">М</div>
        <div>
          <div class="master-name" id="m-name">Мастер</div>
          <div class="master-rating" id="m-rating">⭐ 5.0</div>
        </div>
      </div>
      <button class="logout" onclick="logout()">Выйти</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('available')">Свободные<span class="count-badge" id="count-available">0</span></button>
      <button class="tab" onclick="switchTab('mine')">Мои заказы<span class="count-badge" id="count-mine">0</span></button>
      <button class="tab" onclick="switchTab('done')">Завершённые<span class="count-badge" id="count-done">0</span></button>
    </div>

    <div id="list"></div>
  </div>
</div>

<script>
const sb = supabase.createClient('https://exmwkutxjyrwqzhxtjba.supabase.co', 'sb_publishable_1MB5-b5BJAlK_XdoMLkZMA_0W-gC4sy');
let currentUser = null;
let currentTab = 'available';
let allRequests = [];

sb.auth.onAuthStateChange((e, session) => {
  currentUser = session?.user || null;
  if (currentUser) {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadMasterProfile();
    loadRequests();
  } else {
    document.getElementById('login-box').style.display = 'block';
    document.getElementById('panel').style.display = 'none';
  }
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('login-err');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { err.textContent = 'Неверный email или пароль'; err.classList.add('show'); return; }
  err.classList.remove('show');
}

async function logout() { await sb.auth.signOut(); }

async function loadMasterProfile() {
  const { data, error } = await sb.from('masters').select('*').eq('user_id', currentUser.id).single();
  if (error || !data) {
    document.getElementById('list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Вы не зарегистрированы как мастер</h3><p style="font-size:.85rem;margin-top:.5rem">Обратитесь к администратору чтобы добавить вас в систему.</p></div>';
    return;
  }
  document.getElementById('m-name').textContent = data.full_name;
  document.getElementById('m-rating').textContent = '⭐ ' + data.rating;
  document.getElementById('m-avatar').textContent = data.full_name[0].toUpperCase();
}

async function loadRequests() {
  const { data, error } = await sb.from('requests').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  allRequests = data || [];
  updateCounts();
  renderList();
}

function updateCounts() {
  const available = allRequests.filter(r => r.status === 'received' && !r.master_id).length;
  const mine = allRequests.filter(r => r.master_id === currentUser?.id && r.status !== 'done').length;
  const done = allRequests.filter(r => r.master_id === currentUser?.id && r.status === 'done').length;
  document.getElementById('count-available').textContent = available;
  document.getElementById('count-mine').textContent = mine;
  document.getElementById('count-done').textContent = done;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i===0&&tab==='available')||(i===1&&tab==='mine')||(i===2&&tab==='done'));
  });
  renderList();
}

const STATUS_META = {
  received:   { label: 'Свободна',  cls: 'badge-received' },
  assigned:   { label: 'Назначена', cls: 'badge-assigned' },
  inprogress: { label: 'В работе',  cls: 'badge-inprogress' },
  done:       { label: 'Готово',    cls: 'badge-done' },
};

function renderList() {
  let filtered = [];
  if (currentTab === 'available') filtered = allRequests.filter(r => r.status === 'received' && !r.master_id);
  if (currentTab === 'mine') filtered = allRequests.filter(r => r.master_id === currentUser?.id && r.status !== 'done');
  if (currentTab === 'done') filtered = allRequests.filter(r => r.master_id === currentUser?.id && r.status === 'done');

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    const msgs = { available: 'Нет свободных заявок', mine: 'У вас нет активных заказов', done: 'Пока нет завершённых заказов' };
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>${msgs[currentTab]}</h3></div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const meta = STATUS_META[r.status] || STATUS_META.received;
    const date = new Date(r.created_at).toLocaleString('ru-KZ', { day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' });

    let actions = '';
    if (currentTab === 'available') {
      actions = `<button class="btn-sm btn-green" onclick="claimRequest('${r.id}')">Взять заказ →</button>`;
    } else if (currentTab === 'mine') {
      if (r.status === 'assigned') actions = `<button class="btn-sm btn-blue" onclick="updateStatus('${r.id}','inprogress')">Начать работу</button>`;
      if (r.status === 'inprogress') actions = `<button class="btn-sm btn-green" onclick="updateStatus('${r.id}','done')">Завершить ✓</button>`;
    }

    return `<div class="req-card">
      <div class="req-top">
        <div>
          <div class="req-device">${r.device}</div>
          <div class="req-issue">${r.issue}</div>
        </div>
        <div class="status-badge ${meta.cls}">${meta.label}</div>
      </div>
      <div class="req-meta">
        <span>📍 ${r.address || 'адрес не указан'}</span>
        <span>🕐 ${date}</span>
        <span>💰 ${r.price || 'цена не указана'}</span>
      </div>
      ${r.comment ? `<div style="font-size:.82rem;color:var(--muted);margin-top:.5rem">💬 ${r.comment}</div>` : ''}
      <div class="req-actions">${actions}</div>
    </div>`;
  }).join('');
}

async function claimRequest(id) {
  const { error } = await sb.from('requests').update({ master_id: currentUser.id, status: 'assigned' }).eq('id', id);
  if (error) { alert('Ошибка: ' + error.message); return; }
  loadRequests();
  switchTab('mine');
}

async function updateStatus(id, status) {
  const { error } = await sb.from('requests').update({ status }).eq('id', id);
  if (error) { alert('Ошибка: ' + error.message); return; }
  loadRequests();
}
</script>
</body>
</html>
